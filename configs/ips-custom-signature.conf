# IPS-Test mit eigener Signatur (deterministisch).
# Voraussetzung: Client hängt hinter der FortiGate (LAN/port3), LAN->WAN-Policy = id 1.

# --- 1) Eigene F-SBID-Signatur: Muster NSE4IPSTEST im Client-HTTP ---
config ips custom
    edit "NSE4-Test"
        set signature "F-SBID( --name \"NSE4.IPS.Test\"; --protocol tcp; --service HTTP; --flow from_client; --pattern \"NSE4IPSTEST\"; --no_case; )"
    next
end
# Hinweis: FortiOS vergibt automatisch eine attack-id (z. B. 6004).
#   diagnose ips signature read <id>   bzw.   show ips custom

# --- 2) Signatur in einen Sensor (set rule = numerische ID!) ---
# Eval-Lizenz deckelt die Sensor-Tabelle bei 10 -> bestehenden Sensor wiederverwenden.
config ips sensor
    edit "Basic-IPS"
        config entries
            edit 10
                set rule 6004
                set status enable
                set action block
                set log enable
                set log-packet enable
            next
        end
    next
end

# --- 3) Sensor an die LAN->WAN-Policy ---
config firewall policy
    edit 1
        set utm-status enable
        set ips-sensor "Basic-IPS"
        set logtraffic all
    next
end

# --- 4) Memory-Logging (diskless VM) sicherstellen ---
config log memory filter
    set severity information
end

# --- Test (vom Client) ---
#   curl http://neverssl.com/                  -> 200 (sauber)
#   curl 'http://neverssl.com/x?p=NSE4IPSTEST' -> dropped (IPS)
# Beweis: Log & Report > Security Events > Intrusion Prevention -> NSE4.IPS.Test / dropped
