# FortiGate-VM Baseline-Konfiguration (NSE4-Lab)
# Eingabe über die serielle Konsole (nc 127.0.0.1 4555) nach dem ersten Login.
# Erster Befehl deaktiviert das Paging, damit lange Ausgaben nicht mit --More-- stoppen.

config system console
    set output standard
end

# --- Interfaces -------------------------------------------------------------
config system interface
    edit "port1"
        # WAN + Management: bezieht IP per DHCP von der UTM-NAT (192.168.64.0/24)
        set allowaccess ping https ssh http
    next
    edit "port2"
        # Internes LAN
        set mode static
        set ip 192.168.1.99 255.255.255.0
        set allowaccess ping https ssh
    next
end

# --- DHCP-Server für das LAN (port2) ---------------------------------------
config system dhcp server
    edit 1
        set interface "port2"
        set default-gateway 192.168.1.99
        set netmask 255.255.255.0
        set dns-service default
        config ip-range
            edit 1
                set start-ip 192.168.1.100
                set end-ip 192.168.1.200
            next
        end
    next
end

# --- Security-Policy: LAN -> WAN mit Source-NAT ----------------------------
config firewall policy
    edit 1
        set name "LAN-to-WAN"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat enable
    next
end

# Hinweis: Eval-Lizenz erlaubt max. 3 Policies / 3 Routen / 3 Interfaces.
