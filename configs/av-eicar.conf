# AntiVirus-Test mit EICAR (deterministisch). Client hinter der FortiGate (LAN/port3), Policy 1 = LAN->WAN.

# --- AV-Profil an die Policy (eingebautes "default" reicht; schont Eval-Limit) ---
config firewall policy
    edit 1
        set utm-status enable
        set av-profile "default"
        set ssl-ssh-profile "certificate-inspection"
    next
end

# --- EICAR über Klartext-HTTP bereitstellen (auf dem Lab-Host) ---
#   printf '%s' 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*' > www/eicar.com
#   python3 -m http.server 8000 --bind 0.0.0.0

# --- Test (vom Client) ---
#   curl http://<lab-host>/clean.txt   -> 200 (durch)
#   curl http://<lab-host>/eicar.com   -> code=200 size=0 exit=56 (Connection reset = AV-Block)
# Beweis: Log & Report > Security Events > AntiVirus -> EICAR_TEST_FILE / blocked / src 192.0.2.50
#
# Hinweis: EICAR ist kein echter Virus, sondern ein 68-Byte-Standard-Testmuster.
# HTTPS bräuchte SSL-Deep-Inspection; flow-AV sieht nur Klartext.
